<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>plattenregal</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Courier New", monospace;
    font-size: 14px;
    background: #fff;
    color: #000;
    padding: 16px 14px 40px 14px;
    max-width: 680px;
  }

  /* ── HEADER ── */
  #site-header {
    border: 2px solid #000;
    border-bottom: 4px solid #000;
    padding: 10px 12px 8px 12px;
    margin-bottom: 14px;
    position: relative;
  }

  h1 {
    font-family: "Special Elite", "Courier New", monospace;
    font-size: 28px;
    font-weight: normal;
    letter-spacing: 2px;
    line-height: 1;
  }

  h1 span {
    display: inline-block;
    background: #000;
    color: #fff;
    padding: 0 5px;
    margin-right: 2px;
  }

  p.sub {
    font-size: 11px;
    color: #555;
    margin-top: 4px;
    border-top: 1px dashed #bbb;
    padding-top: 4px;
  }

  /* ── CONTROLS ── */
  #controls {
    font-size: 12px;
    margin-bottom: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    align-items: center;
    border: 1px solid #000;
    padding: 6px 8px;
  }

  #controls::before {
    content: "// filter";
    font-size: 10px;
    color: #999;
    width: 100%;
    display: block;
    margin-bottom: 2px;
  }

  select, input[type=text], input[type=number], input[type=password], textarea {
    font-family: "Courier New", monospace;
    font-size: 12px;
    border: 1px solid #000;
    padding: 2px 4px;
    background: #fff;
    color: #000;
  }

  #controls input[type=text] { width: 120px; }

  button {
    font-family: "Courier New", monospace;
    font-size: 12px;
    border: 1px solid #000;
    padding: 2px 8px;
    background: #fff;
    color: #000;
    cursor: pointer;
  }
  button:hover { background: #000; color: #fff; }

  /* ── ARTIST GROUPS ── */
  .artist-group { margin-bottom: 6px; }
  .artist-group:first-child .group-header { border-top: 1px solid #000; }

  .group-header {
    border-bottom: 1px solid #000;
    padding: 10px 0 8px 0;
    cursor: default;
  }
  .group-header.collapsible { cursor: pointer; }
  .group-header.collapsible:hover .group-artist { text-decoration: underline; }

  .group-artist {
    font-family: "Special Elite", "Courier New", monospace;
    font-size: 15px;
  }
  .group-toggle {
    font-size: 11px;
    color: #888;
    margin-left: 8px;
    font-family: "Courier New", monospace;
  }

  /* einzelnes album im stack */
  .entry {
    padding: 10px 0 8px 0;
    border-bottom: 1px solid #ccc;
    position: relative;
  }
  .entry:last-child { border-bottom: none; }

  /* gestapelte alben – eingeklappt */
  .stack-peek .entry {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid #eee;
    pointer-events: none;
    opacity: 0.5;
    font-size: 12px;
    overflow: hidden;
    white-space: nowrap;
  }
  .stack-peek .entry canvas { width: 20px; height: 20px; flex-shrink: 0; }
  .stack-peek .entry .entry-head { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin: 0; }
  .stack-peek .entry .entry-rating { font-size: 10px; padding: 0 3px; }
  .stack-peek .entry .entry-meta,
  .stack-peek .entry .entry-review,
  .stack-peek .entry .entry-songs,
  .stack-peek .entry > div[style] { display: none; }

  /* aufgeklappt – normal */
  .stack-peek.open .entry {
    display: block;
    padding: 10px 0 8px 0;
    border-bottom: 1px solid #ccc;
    pointer-events: auto;
    opacity: 1;
    font-size: 14px;
    white-space: normal;
    overflow: visible;
  }
  .stack-peek.open .entry canvas { width: 44px; height: 44px; }
  .stack-peek.open .entry .entry-head { font-size: 15px; margin-bottom: 2px; }
  .stack-peek.open .entry .entry-rating { font-size: 11px; padding: 1px 5px; }
  .stack-peek.open .entry .entry-meta,
  .stack-peek.open .entry .entry-review,
  .stack-peek.open .entry .entry-songs { display: block; }
  .stack-peek.open .entry > div[style] { display: block; }
  .stack-peek.open .entry:last-child { border-bottom: none; }

  /* einzelnes album – immer offen */
  .stack-peek.open-single .entry {
    display: block;
    padding: 10px 0 8px 0;
    border-bottom: none;
    pointer-events: auto;
    opacity: 1;
    white-space: normal;
    overflow: visible;
  }

  .entry-head {
    font-family: "Special Elite", "Courier New", monospace;
    font-size: 15px;
    line-height: 1.3;
    margin-bottom: 2px;
  }

  .entry-rating {
    display: inline-block;
    background: #000;
    color: #fff;
    font-size: 11px;
    padding: 1px 5px;
    margin-left: 6px;
    font-family: "Courier New", monospace;
    vertical-align: middle;
  }

  .entry-meta {
    font-size: 11px;
    color: #666;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .entry-review {
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 6px;
  }

  .entry-songs {
    font-size: 11px;
    color: #333;
    line-height: 1.6;
    border-left: 2px solid #ddd;
    padding-left: 8px;
  }

  .fav {
    font-weight: bold;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .fav::after {
    content: "★";
    font-size: 10px;
    vertical-align: super;
    line-height: 0;
  }

  /* ── COVER CANVAS ── */
  .entry-cover {
    float: left;
    margin: 3px 10px 6px 0;
    width: 44px;
    height: 44px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 1px solid #ccc;
    background: #eee;
    flex-shrink: 0;
  }

  #footer {
    margin-top: 16px;
    font-size: 11px;
    color: #888;
    padding-top: 8px;
    border-top: 2px solid #000;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
  }
  #footer a { color: #000; }
  #footer .hint { font-size: 10px; color: #aaa; flex-basis: 100%; margin-top: 1px; }

  /* ── PASSWORD ── */
  #pw-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.93);
    z-index: 99;
  }
  #pw-box {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: #fff;
    border: 2px solid #000;
    border-bottom: 4px solid #000;
    padding: 18px 20px;
    font-size: 13px;
    width: 260px;
  }
  #pw-box b { display: block; margin-bottom: 10px; font-size: 14px; }
  #pw-input { width: 130px; }
  #pw-ok { margin-left: 5px; }
  #pw-error { font-size: 11px; margin-top: 6px; display: none; color: #000; }

  /* ── ADD SECTION ── */
  #add-section {
    display: none;
    margin-top: 14px;
    border: 1px solid #000;
    padding: 12px;
    font-size: 13px;
  }

  #add-section > b {
    display: block;
    font-family: "Special Elite", "Courier New", monospace;
    font-size: 15px;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px dashed #000;
  }

  .row { margin: 5px 0; display: flex; flex-wrap: wrap; gap: 4px; align-items: baseline; }
  .row label { width: 100px; font-size: 11px; color: #666; flex-shrink: 0; }
  .row input, .row select { flex: 1; min-width: 0; }

  #mb-results { margin: 4px 0; }
  #mb-results a { display: block; font-size: 12px; margin: 2px 0; cursor: pointer; padding: 1px 0; }
  #mb-results a::before { content: "→ "; color: #aaa; }
  #mb-results a:hover { text-decoration: underline; }

  #song-radios {
    max-height: 150px;
    overflow-y: auto;
    border: 1px solid #ccc;
    padding: 4px 8px;
    margin: 4px 0 10px 0;
    font-size: 12px;
    line-height: 1.8;
  }
  #song-radios label { display: block; }

  #status { font-size: 11px; color: #888; margin: 4px 0; font-style: italic; }
  #push-status { font-size: 11px; margin: 6px 0; }

  details summary { cursor: pointer; font-size: 11px; color: #888; padding: 2px 0; }
  details summary:hover { color: #000; }

  textarea { width: 100%; margin-top: 3px; }

  #gh-saved { font-size: 11px; color: #555; margin-left: 8px; display: none; }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    h1 { font-size: 22px; }
    .entry-head { font-size: 14px; }
    #controls input[type=text] { width: 100px; }
    .row label { width: 80px; font-size: 10px; }
    #add-section { padding: 10px; }
  }
</style>
</head>
<body>

<div id="site-header">
  <h1><span>platten</span>regal</h1>
  <p class="sub">albenbewertungen &mdash; subjektiv &mdash; endgueltig &mdash; ★ = lieblingssong</p>
</div>

<div id="controls">
  <span style="font-size:11px;color:#888">sort:</span>
  <select id="sort-key">
    <option value="artist">artist</option>
    <option value="album">album</option>
    <option value="year">jahr</option>
    <option value="genre">genre</option>
    <option value="rating">wertung</option>
    <option value="index">datum</option>
  </select>
  <select id="sort-dir">
    <option value="1">↑</option>
    <option value="-1">↓</option>
  </select>
  <input type="text" id="search" placeholder="suche...">
  <select id="min-rating">
    <option value="0">alle</option>
    <option value="7">7+</option>
    <option value="8">8+</option>
    <option value="9">9+</option>
    <option value="10">nur 10</option>
  </select>
</div>

<div id="list"></div>

<div id="footer">
  <a href="albums.json">albums.json</a>
  <a href="#" id="toggle-add">[+ eintrag]</a>
  <span class="hint">★ = lieblingssong</span>
</div>

<!-- PASSWORD -->
<div id="pw-overlay">
  <div id="pw-box">
    <b>// zugang //</b>
    <input type="password" id="pw-input" autocomplete="off" placeholder="passwort">
    <button id="pw-ok">ok</button>
    <button id="pw-cancel" style="margin-left:4px;color:#888;border-color:#888">abbrechen</button>
    <div id="pw-error">falsch.</div>
  </div>
</div>

<!-- ADD SECTION -->
<div id="add-section">
  <b>// neuer eintrag //</b>

  <details>
    <summary>github einstellungen</summary>
    <div style="margin-top:8px">
      <div class="row"><label>token:</label><input type="password" id="gh-token" placeholder="ghp_..."></div>
      <div class="row"><label>user/repo:</label><input type="text" id="gh-repo" placeholder="name/repo"></div>
      <div class="row"><label>branch:</label><input type="text" id="gh-branch" placeholder="main"></div>
      <div class="row"><label>json-pfad:</label><input type="text" id="gh-path" placeholder="albums.json"></div>
      <button id="btn-save-gh">speichern</button>
      <span id="gh-saved">gespeichert.</span>
    </div>
  </details>
  <br>

  <b style="font-size:12px">1. album suchen</b><br><br>
  <div class="row"><label>kuenstler:</label><input type="text" id="q-artist"></div>
  <div class="row"><label>album:</label><input type="text" id="q-album"></div>
  <button id="btn-search" style="margin-top:6px">suchen</button>
  <div id="status"></div>
  <div id="mb-results"></div>

  <div id="form-section" style="display:none">
    <br><b style="font-size:12px">2. details</b><br><br>
    <div class="row"><label>kuenstler:</label><input type="text" id="f-artist" readonly style="background:#f2f2f2"></div>
    <div class="row"><label>album:</label><input type="text" id="f-album" readonly style="background:#f2f2f2"></div>
    <div class="row"><label>jahr:</label><input type="text" id="f-year" readonly style="background:#f2f2f2;max-width:70px"></div>
    <div class="row"><label>genre:</label><input type="text" id="f-genre" placeholder="anpassen" list="genre-list"></div>
    <datalist id="genre-list"></datalist>
    <div class="row"><label>wertung (1-10):</label><input type="number" id="f-rating" min="1" max="10" step="0.5" style="max-width:60px"></div>
    <div class="row"><label>cover url:</label><input type="text" id="f-cover" placeholder="direkte bild-url (pflicht)" required></div>
    <br>
    <div id="song-section" style="display:none">
      <span style="font-size:12px">lieblingssong:</span><br>
      <div id="song-radios"></div>
    </div>
    <span style="font-size:12px">rezension:</span><br>
    <textarea id="f-review" rows="3"></textarea>
    <br><br>
    <button id="btn-push">speichern + push zu github</button>
    <div id="push-status"></div>
  </div>
</div>

<script>
const PW = "Hallo&Hallo123";
let unlocked = sessionStorage.getItem("pr_ok") === "1";
let albums = [], selectedSongs = [], sortKey = "artist", sortDir = 1;

function entryHTML(a) {
  const songs = a.songs.map(s =>
    s === a.favorite_song ? `<span class="fav">${s}</span>` : s
  ).join(", ");
  const cid = "cv-" + (a.artist+a.album).replace(/[^a-zA-Z0-9]/g,"");
  // genre: kommagetrennte tags
  const genres = a.genre ? a.genre.split(",").map(g=>g.trim()).filter(Boolean).join(" &middot; ") : "";
  return `<div class="entry">`
    + `<canvas class="entry-cover" id="${cid}" width="4" height="4"></canvas>`
    + `<div class="entry-head">${a.album}`
    + `<span class="entry-rating">${Number(a.rating)}/10</span></div>`
    + `<div class="entry-meta">${a.year}${genres ? " &nbsp;&middot;&nbsp; "+genres : ""}</div>`
    + `<div class="entry-review">${a.review}</div>`
    + `<div class="entry-songs">${songs}</div>`
    + `<div style="clear:both"></div>`
    + `</div>`;
}

function render() {
  const q    = document.getElementById("search").value.toLowerCase();
  const minR = parseInt(document.getElementById("min-rating").value);

  let list = albums
    .map((a, i) => ({...a, index: i}))
    .filter(a =>
      a.rating >= minR &&
      (!q || (a.artist+a.album+a.genre+a.year).toLowerCase().includes(q))
    );

  if (sortKey === "index") {
    list.sort((a,b) => (a.index - b.index) * sortDir);
  } else {
    list.sort((a,b) => {
      let va = a[sortKey], vb = b[sortKey];
      if (typeof va==="string") { va=va.toLowerCase(); vb=vb.toLowerCase(); }
      return va<vb ? -sortDir : va>vb ? sortDir : 0;
    });
  }

  if (!list.length) {
    document.getElementById("list").innerHTML =
      `<div class="entry" style="color:#aaa;font-style:italic;border-top:1px solid #000;border-bottom:1px solid #000;padding:10px 0">keine eintraege.</div>`;
    return;
  }

  // nach artist gruppieren (Reihenfolge der Gruppen = erster Treffer im sortierten Array)
  const groups = [];
  const groupMap = {};
  for (const a of list) {
    const key = a.artist.toLowerCase();
    if (!groupMap[key]) {
      groupMap[key] = { artist: a.artist, albums: [] };
      groups.push(groupMap[key]);
    }
    groupMap[key].albums.push(a);
  }

  document.getElementById("list").innerHTML = groups.map(g => {
    const multi = g.albums.length > 1;
    const stackId = "grp-" + g.artist.replace(/[^a-zA-Z0-9]/g,"");
    const headerClass = "group-header" + (multi ? " collapsible" : "");
    const onClick = multi ? `onclick="toggleGroup('${stackId}')"` : "";
    const toggle = multi ? `<span class="group-toggle" id="${stackId}-toggle">[+ ${g.albums.length} alben]</span>` : "";

    return `<div class="artist-group">`
      + `<div class="${headerClass}" ${onClick}>`
      + `<span class="group-artist">${g.artist}</span>${toggle}`
      + `</div>`
      + `<div class="stack-peek${multi ? "" : " open-single"}" id="${stackId}">`
      + g.albums.map(a => entryHTML(a)).join("")
      + `</div>`
      + `</div>`;
  }).join("");

  loadCovers(list);
}

function toggleGroup(id) {
  const el = document.getElementById(id);
  const toggle = document.getElementById(id+"-toggle");
  const isOpen = el.classList.contains("open");
  el.classList.toggle("open");
  const count = el.querySelectorAll(".entry").length;
  toggle.textContent = isOpen ? `[+ ${count} alben]` : `[– ${count} alben]`;
}

["sort-key","sort-dir","min-rating"].forEach(id =>
  document.getElementById(id).addEventListener("change", e => {
    if (id==="sort-key") sortKey=e.target.value;
    if (id==="sort-dir") sortDir=parseInt(e.target.value);
    render();
  })
);
document.getElementById("search").addEventListener("input", render);

(async () => {
  try { albums = await (await fetch("albums.json?_="+Date.now())).json(); } catch(e) { albums=[]; }
  render();
  updateGenreList();
})();

function updateGenreList() {
  const genres = [...new Set(albums.map(a => a.genre).filter(Boolean))].sort();
  document.getElementById("genre-list").innerHTML = genres.map(g => `<option value="${g}">`).join("");
}

// ── COVER ART (verpixelt) ──────────────
const CACHE_VERSION = "v1";
const CACHE_PREFIX = "pr_cover_" + CACHE_VERSION + "_";
if (localStorage.getItem("pr_cache_version") !== CACHE_VERSION) {
  Object.keys(localStorage).filter(k => k.startsWith("pr_cover_")).forEach(k => localStorage.removeItem(k));
  localStorage.setItem("pr_cache_version", CACHE_VERSION);
}

function canvasId(a) {
  return "cv-" + (a.artist+a.album).replace(/[^a-zA-Z0-9]/g,"");
}

function cacheKey(a) {
  return CACHE_PREFIX + (a.artist+"|"+a.album).replace(/[^a-zA-Z0-9|]/g,"").slice(0,60);
}

async function drawCover(canvas, url) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(img, 0, 0, 4, 4);
      try {
        const full = document.createElement("canvas");
        full.width = full.height = 4;
        full.getContext("2d").drawImage(img, 0, 0, 4, 4);
        localStorage.setItem(cacheKey(canvas._album), full.toDataURL());
      } catch(e) {}
      resolve();
    };
    img.onerror = () => resolve();
    img.src = url;
  });
}

async function loadCovers(list) {
  for (const a of list) {
    const canvas = document.getElementById(canvasId(a));
    if (!canvas || canvas.dataset.loaded) continue;
    if (!a.cover_url) continue;
    canvas._album = a;

    const cached = localStorage.getItem(cacheKey(a));
    if (cached) {
      const img = new Image();
      img.onload = () => {
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(img, 0, 0, 4, 4);
      };
      img.src = cached;
      canvas.dataset.loaded = "1";
      continue;
    }

    await drawCover(canvas, a.cover_url);
    canvas.dataset.loaded = "1";
  }
}

// password
document.getElementById("toggle-add").addEventListener("click", e => {
  e.preventDefault();
  if (unlocked) toggleAdd();
  else { document.getElementById("pw-overlay").style.display="block"; document.getElementById("pw-input").focus(); }
});
function checkPw() {
  if (document.getElementById("pw-input").value === PW) {
    unlocked=true; sessionStorage.setItem("pr_ok","1");
    document.getElementById("pw-overlay").style.display="none";
    document.getElementById("pw-input").value="";
    document.getElementById("pw-error").style.display="none";
    toggleAdd();
  } else {
    document.getElementById("pw-error").style.display="block";
    document.getElementById("pw-input").select();
  }
}
document.getElementById("pw-ok").addEventListener("click", checkPw);
document.getElementById("pw-cancel").addEventListener("click", () => {
  document.getElementById("pw-overlay").style.display="none";
  document.getElementById("pw-input").value="";
  document.getElementById("pw-error").style.display="none";
});
document.getElementById("pw-input").addEventListener("keydown", e => { if(e.key==="Enter") checkPw(); });
function toggleAdd() {
  const s=document.getElementById("add-section");
  s.style.display=s.style.display==="none"?"block":"none";
  if (s.style.display==="block") loadGh();
}

// github
function saveGh() {
  localStorage.setItem("gh_token",  document.getElementById("gh-token").value.trim());
  localStorage.setItem("gh_repo",   document.getElementById("gh-repo").value.trim());
  localStorage.setItem("gh_branch", document.getElementById("gh-branch").value.trim()||"main");
  localStorage.setItem("gh_path",   document.getElementById("gh-path").value.trim()||"albums.json");
  const s=document.getElementById("gh-saved"); s.style.display="inline";
  setTimeout(()=>s.style.display="none",2000);
}
function loadGh() {
  document.getElementById("gh-token").value  = localStorage.getItem("gh_token")||"";
  document.getElementById("gh-repo").value   = localStorage.getItem("gh_repo")||"";
  document.getElementById("gh-branch").value = localStorage.getItem("gh_branch")||"main";
  document.getElementById("gh-path").value   = localStorage.getItem("gh_path")||"albums.json";
}
document.getElementById("btn-save-gh").addEventListener("click", saveGh);

// musicbrainz
async function mbSearch() {
  const artist=document.getElementById("q-artist").value.trim();
  const album=document.getElementById("q-album").value.trim();
  if (!artist&&!album) return;
  const st=document.getElementById("status");
  document.getElementById("mb-results").innerHTML="";
  document.getElementById("form-section").style.display="none";
  st.textContent="suche...";
  try {
    const data=await (await fetch(
      `https://musicbrainz.org/ws/2/release/?query=${encodeURIComponent(artist+" "+album)}&fmt=json&limit=8`,
      {headers:{"User-Agent":"plattenregal/1.0"}}
    )).json();
    st.textContent=data.releases.length?`${data.releases.length} treffer:`:"nichts gefunden.";
    document.getElementById("mb-results").innerHTML=data.releases.map(r=>{
      const a=(r["artist-credit"]?.[0]?.name||"?").replace(/"/g,"&quot;");
      const t=r.title.replace(/"/g,"&quot;");
      const y=(r.date||"").slice(0,4)||"?";
      return `<a data-id="${r.id}" data-artist="${a}" data-album="${t}" data-year="${y}">${a} &ndash; ${r.title} (${y})</a>`;
    }).join("");
    document.getElementById("mb-results").querySelectorAll("a").forEach(el=>el.addEventListener("click",()=>mbSelect(el)));
  } catch(e) { st.textContent="fehler: "+e.message; }
}

async function mbSelect(el) {
  const st=document.getElementById("status");
  st.textContent="lade tracks...";
  document.getElementById("mb-results").innerHTML="";
  document.getElementById("f-artist").value=el.dataset.artist;
  document.getElementById("f-album").value=el.dataset.album;
  document.getElementById("f-year").value=el.dataset.year;
  try {
    const data=await (await fetch(
      `https://musicbrainz.org/ws/2/release/${el.dataset.id}?inc=recordings+tags&fmt=json`,
      {headers:{"User-Agent":"plattenregal/1.0"}}
    )).json();
    selectedSongs=[];
    (data.media||[]).forEach(m=>(m.tracks||[]).forEach(t=>selectedSongs.push(t.title)));
    const tags=(data.tags||[]).sort((a,b)=>b.count-a.count);
    if (tags.length) document.getElementById("f-genre").value=tags[0].name;
    document.getElementById("song-radios").innerHTML=selectedSongs.map(s=>
      `<label><input type="radio" name="fav" value="${s.replace(/"/g,"&quot;")}"> ${s}</label>`
    ).join("");
    document.getElementById("song-section").style.display="block";
    document.getElementById("form-section").style.display="block";
    st.textContent=`${selectedSongs.length} tracks geladen.`;
  } catch(e) { st.textContent="fehler: "+e.message; }
}

document.getElementById("btn-search").addEventListener("click", mbSearch);
["q-artist","q-album"].forEach(id=>
  document.getElementById(id).addEventListener("keydown",e=>{if(e.key==="Enter")mbSearch();})
);

// push
document.getElementById("btn-push").addEventListener("click", async () => {
  const fav=document.querySelector('input[name="fav"]:checked');
  const rating=parseFloat(document.getElementById("f-rating").value);
  const ps=document.getElementById("push-status");
  if (!fav)                                           {ps.textContent="fehler: kein lieblingssong.";return;}
  if (isNaN(rating)||rating<1||rating>10||rating*2!==Math.round(rating*2)) {ps.textContent="fehler: wertung 1-10, nur .5 erlaubt.";return;}
  const coverUrl=document.getElementById("f-cover").value.trim();
  if (!coverUrl) {ps.textContent="fehler: cover url fehlt.";return;}
  const token=localStorage.getItem("gh_token");
  const repo=localStorage.getItem("gh_repo");
  const branch=localStorage.getItem("gh_branch")||"main";
  const path=localStorage.getItem("gh_path")||"albums.json";
  if (!token||!repo) {ps.textContent="fehler: github einstellungen fehlen.";return;}
  const entry={
    artist:document.getElementById("f-artist").value,
    album:document.getElementById("f-album").value,
    year:parseInt(document.getElementById("f-year").value)||document.getElementById("f-year").value,
    genre:document.getElementById("f-genre").value,
    rating,favorite_song:fav.value,songs:selectedSongs,
    review:document.getElementById("f-review").value,
    cover_url:coverUrl
  };
  ps.textContent="verbinde...";
  try {
    const shaRes=await fetch(`https://api.github.com/repos/${repo}/contents/${path}?ref=${branch}`,
      {headers:{Authorization:`token ${token}`,Accept:"application/vnd.github+json"}});
    if (!shaRes.ok) throw new Error(`${shaRes.status} - token/repo falsch?`);
    const {sha}=await shaRes.json();
    const content=btoa(unescape(encodeURIComponent(JSON.stringify([...albums,entry],null,2))));
    const putRes=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
      method:"PUT",
      headers:{Authorization:`token ${token}`,Accept:"application/vnd.github+json","Content-Type":"application/json"},
      body:JSON.stringify({message:`add: ${entry.artist} - ${entry.album}`,content,sha,branch})
    });
    if (!putRes.ok) {const err=await putRes.json();throw new Error(err.message||putRes.status);}
    albums.push(entry); render(); updateGenreList();
    ps.textContent="fertig. ~30 sek bis live.";
    ["f-artist","f-album","f-year","f-genre","f-rating","f-review","f-cover"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("song-radios").innerHTML="";
    document.getElementById("song-section").style.display="none";
    document.getElementById("form-section").style.display="none";
    document.getElementById("q-artist").value=document.getElementById("q-album").value="";
    selectedSongs=[];
  } catch(e) {ps.textContent="fehler: "+e.message;}
});
</script>
</body>
</html>
